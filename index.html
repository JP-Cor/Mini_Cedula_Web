<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captura de documento</title>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      color: #1f2937;
    }

    .container {
      max-width: 760px;
      margin: auto;
      padding: 16px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    h1, h2 {
      margin-top: 0;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 12px;
      margin-bottom: 6px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 16px;
    }

    input {
      margin-bottom: 10px;
    }

    button {
      border: none;
      background: #111827;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button.secondary {
      background: #374151;
    }

    img.preview {
      width: 100%;
      border-radius: 12px;
      margin-top: 10px;
      border: 1px solid #d1d5db;
      display: none;
    }

    .small {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #111827;
      white-space: pre-wrap;
    }

    .required {
      color: #dc2626;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Formulario con fotos y PDF</h1>
      <p class="small">
        Toma ambas fotos, llena todos los campos obligatorios y genera un PDF para compartir.
      </p>
    </div>

    <div class="card">
      <h2>1. Fotos del documento</h2>

      <label for="frontInput">Foto frente <span class="required">*</span></label>
      <input type="file" id="frontInput" accept="image/*" capture="environment">
      <img id="frontPreview" class="preview" alt="Foto frente">

      <label for="backInput">Foto reverso <span class="required">*</span></label>
      <input type="file" id="backInput" accept="image/*" capture="environment">
      <img id="backPreview" class="preview" alt="Foto reverso">
    </div>

    <div class="card">
      <h2>2. Datos obligatorios</h2>

      <label for="fullName">Nombre completo <span class="required">*</span></label>
      <input type="text" id="fullName" placeholder="Ej: Juan Pérez Mora">

      <label for="idNumber">Número de cédula <span class="required">*</span></label>
      <input type="text" id="idNumber" placeholder="Ej: 1-1234-5678">

      <label for="phone">Teléfono <span class="required">*</span></label>
      <input type="tel" id="phone" placeholder="Ej: 8888-8888">

    </div>

    <div class="card">
      <h2>3. Generar y compartir</h2>
      <button id="pdfBtn">Generar PDF</button>
      <button id="shareBtn" class="secondary">Compartir PDF</button>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    
    <script>
  const { jsPDF } = window.jspdf;

  let frontFile = null;
  let backFile = null;
  let pdfBlob = null;

  const frontInput = document.getElementById("frontInput");
  const backInput = document.getElementById("backInput");
  const frontPreview = document.getElementById("frontPreview");
  const backPreview = document.getElementById("backPreview");

  const fullName = document.getElementById("fullName");
  const idNumber = document.getElementById("idNumber");
  const phone = document.getElementById("phone");
  const email = document.getElementById("email");

  const pdfBtn = document.getElementById("pdfBtn");
  const shareBtn = document.getElementById("shareBtn");
  const statusBox = document.getElementById("status");

  frontInput.addEventListener("change", (e) => loadImage(e, "front"));
  backInput.addEventListener("change", (e) => loadImage(e, "back"));
  pdfBtn.addEventListener("click", generatePDF);
  shareBtn.addEventListener("click", sharePDF);

  function loadImage(event, side) {
    const file = event.target.files[0];
    if (!file) return;

    const url = URL.createObjectURL(file);

    if (side === "front") {
      frontFile = file;
      frontPreview.src = url;
      frontPreview.style.display = "block";
    } else {
      backFile = file;
      backPreview.src = url;
      backPreview.style.display = "block";
    }
  }

  function validateFields() {
    if (!frontFile) {
      statusBox.textContent = "Debes tomar la foto del frente.";
      return false;
    }

    if (!backFile) {
      statusBox.textContent = "Debes tomar la foto del reverso.";
      return false;
    }

    if (!fullName.value.trim()) {
      statusBox.textContent = "El nombre completo es obligatorio.";
      fullName.focus();
      return false;
    }

    if (!idNumber.value.trim()) {
      statusBox.textContent = "El número de cédula es obligatorio.";
      idNumber.focus();
      return false;
    }

    if (!phone.value.trim()) {
      statusBox.textContent = "El teléfono es obligatorio.";
      phone.focus();
      return false;
    }

    if (!email.value.trim()) {
      statusBox.textContent = "El correo es obligatorio.";
      email.focus();
      return false;
    }

    if (!isValidEmail(email.value.trim())) {
      statusBox.textContent = "Debes escribir un correo válido.";
      email.focus();
      return false;
    }

    return true;
  }

  function isValidEmail(value) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
  }

  function fileToOptimizedDataURL(file, maxWidth = 1200, quality = 0.82) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();

      reader.onload = () => {
        const img = new Image();

        img.onload = () => {
          let width = img.width;
          let height = img.height;

          if (width > maxWidth) {
            height = Math.round((height * maxWidth) / width);
            width = maxWidth;
          }

          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;

          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, width, height);

          const dataUrl = canvas.toDataURL("image/jpeg", quality);
          resolve(dataUrl);
        };

        img.onerror = reject;
        img.src = reader.result;
      };

      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function generatePDF() {
    try {
      if (!validateFields()) return;

      statusBox.textContent = "Generando PDF...";

      const doc = new jsPDF({
        orientation: "portrait",
        unit: "mm",
        format: "a4",
        compress: true
      });

      const frontData = await fileToOptimizedDataURL(frontFile);
      const backData = await fileToOptimizedDataURL(backFile);

      doc.setFontSize(18);
      doc.text("Formulario de identificación", 14, 18);

      doc.setFontSize(12);
      doc.text("Nombre completo: " + fullName.value.trim(), 14, 32);
      doc.text("Número de cédula: " + idNumber.value.trim(), 14, 40);
      doc.text("Teléfono: " + phone.value.trim(), 14, 48);
      doc.text("Correo: " + email.value.trim(), 14, 56);

      doc.setFontSize(11);
      doc.text("Foto frente:", 14, 70);
      doc.addImage(frontData, "JPEG", 14, 74, 85, 54);

      doc.text("Foto reverso:", 110, 70);
      doc.addImage(backData, "JPEG", 110, 74, 85, 54);

      pdfBlob = doc.output("blob");

      if (!pdfBlob || pdfBlob.size === 0) {
        throw new Error("El PDF quedó vacío.");
      }

      statusBox.textContent = "PDF generado correctamente.";
    } catch (error) {
      console.error("Error generando PDF:", error);
      statusBox.textContent = "Ocurrió un error al generar el PDF. Revisa la consola.";
    }
  }

  async function sharePDF() {
    try {
      if (!pdfBlob) {
        await generatePDF();
      }

      if (!pdfBlob) return;

      const file = new File([pdfBlob], "documento_cliente.pdf", {
        type: "application/pdf"
      });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({
          title: "Documento del cliente",
          text: "Comparto el PDF generado.",
          files: [file]
        });
        statusBox.textContent = "PDF compartido correctamente.";
      } else {
        const url = URL.createObjectURL(pdfBlob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "documento_cliente.pdf";
        document.body.appendChild(a);
        a.click();
        a.remove();
        statusBox.textContent = "El PDF se descargó correctamente.";
      }
    } catch (error) {
      console.error("Error compartiendo PDF:", error);
      statusBox.textContent = "No se pudo compartir el PDF.";
    }
  }
</script>
      }
    }
  </script>
</body>
</html>
