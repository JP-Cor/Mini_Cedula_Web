<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Captura Cédula PRO</title>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>

<style>
body{font-family:Arial;margin:0;background:#111;color:#fff}
.container{padding:10px}

.camera{
  position:relative;
  width:100%;
  height:75vh;
  background:#000;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* MARCO REAL */
.frame{
  position:absolute;
  left:15%;
  top:30%;
  width:70%;
  height:30%;
  border:3px solid #00ffcc;
  border-radius:12px;
  box-shadow:0 0 0 9999px rgba(0,0,0,0.5);
}

button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#00ffcc;
  font-weight:bold;
}

img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="camera">
  <video id="video" autoplay playsinline></video>
  <div class="frame"></div>
</div>

<button onclick="startCamera()">Abrir Cámara</button>
<button onclick="capture()">Tomar Foto</button>

<img id="preview">

<canvas id="canvas" style="display:none;"></canvas>

</div>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let preview = document.getElementById("preview");

let stream;

async function startCamera(){
  stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });
  video.srcObject = stream;
}

/* 🔥 AQUÍ ESTÁ LA MAGIA */
async function capture(){

  const vw = video.videoWidth;
  const vh = video.videoHeight;

  canvas.width = vw;
  canvas.height = vh;

  ctx.drawImage(video,0,0,vw,vh);

  // 🔥 RECORTE EXACTO DEL MARCO
  const x = vw * 0.15;
  const y = vh * 0.30;
  const w = vw * 0.70;
  const h = vh * 0.30;

  let crop = ctx.getImageData(x,y,w,h);

  // Canvas nuevo para el recorte
  let tempCanvas = document.createElement("canvas");
  tempCanvas.width = w;
  tempCanvas.height = h;
  let tctx = tempCanvas.getContext("2d");
  tctx.putImageData(crop,0,0);

  // 🔥 INTENTA ENDEREZAR
  let finalCanvas = autoRotate(tempCanvas);

  preview.src = finalCanvas.toDataURL("image/jpeg",0.95);

  stopCamera();
}

function stopCamera(){
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
  }
}

/* 🔥 AUTO ROTAR */
function autoRotate(canvasInput){

  let w = canvasInput.width;
  let h = canvasInput.height;

  // si está vertical la gira
  if(h > w){
    let canvas = document.createElement("canvas");
    canvas.width = h;
    canvas.height = w;
    let ctx = canvas.getContext("2d");

    ctx.translate(h/2,w/2);
    ctx.rotate(Math.PI/2);
    ctx.drawImage(canvasInput,-w/2,-h/2);

    return canvas;
  }

  return canvasInput;
}
</script>

</body>
</html>
